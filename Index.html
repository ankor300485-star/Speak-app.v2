const shuffle = a => [...a].sort(()=>Math.random()-.5);
const levelColor = l => ["#64748b","#f59e0b","#3b82f6","#8b5cf6","#22c55e","#fbbf24"][l]||"#64748b";
const levelLabel = l => ["Новое","Знакомо","Учу","Помню","Хорошо","Выучено"][l]||"Новое";
const C = {bg:"#0f172a",card:"#1e293b",accent:"#6366f1",green:"#22c55e",red:"#ef4444",yellow:"#f59e0b",blue:"#0ea5e9",text:"#f1f5f9",muted:"#94a3b8",border:"#334155",purple:"#8b5cf6"};
const LS = {get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};

function ProgressBar({pct,color=C.accent}){return(<div style={{height:8,borderRadius:4,background:C.border,overflow:"hidden",margin:"6px 0"}}><div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color,borderRadius:4,transition:"width 0.4s"}}/></div>);}
function BottomNav({screen,setScreen,errorCount}){const tabs=[{id:"home",icon:"🏠",label:"Главная"},{id:"vocab",icon:"📚",label:"Словарь"},{id:"errors",icon:"📔",label:errorCount?`❗${errorCount}`:"Ошибки"},{id:"progress",icon:"📊",label:"Прогресс"}];return(<nav style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0",zIndex:50}}>{tabs.map(t=>(<button key={t.id} onClick={()=>setScreen(t.id)} style={{background:"none",border:"none",color:screen===t.id?C.accent:C.muted,fontSize:22,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 16px"}}><span>{t.icon}</span><span style={{fontSize:10,fontWeight:500}}>{t.label}</span></button>))}</nav>);}

function PhoneticModal({word,onClose}){
  const cacheKey=`sbz_ph_${word.id}`;
  const cached=LS.get(cacheKey);
  const [text,setText]=useState(cached||word.phonetic||"");
  const [loading,setLoading]=useState(false);
  const [source,setSource]=useState(cached?"cache":"offline");
  useEffect(()=>{
    if(cached||!navigator.onLine||!ANTHROPIC_KEY)return;
    setLoading(true);
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:`Фонетический разбор на русском: "${word.en}" (IPA: ${word.ipa}, перевод: ${word.ru}). Объясни произношение, ударение, ошибки русскоязычных, мнемоническое правило. Кратко и живо.`}]})})
    .then(r=>r.json()).then(d=>{const t=d.content?.map(b=>b.text||"").join("")||word.phonetic;setText(t);LS.set(cacheKey,t);setSource("online");})
    .catch(()=>{setText(word.phonetic);setSource("offline");})
    .finally(()=>setLoading(false));
  },[]);
  return(<div style={{position:"fixed",inset:0,background:"#000b",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={{background:C.card,borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"80vh",overflow:"auto",padding:24,border:`1px solid ${C.border}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}><div><div style={{fontWeight:700,fontSize:20}}>{word.en}</div><div style={{color:C.blue,fontFamily:"monospace",fontSize:13}}>{word.ipa}</div><div style={{color:C.purple,fontSize:13,fontStyle:"italic"}}>📢 {word.rus}</div></div><button onClick={onClose} style={{background:C.border,border:"none",color:C.text,borderRadius:20,width:32,height:32,fontSize:18,cursor:"pointer"}}>✕</button></div><div style={{fontSize:10,color:source==="online"?C.green:source==="cache"?C.blue:C.muted,marginBottom:10}}>{source==="online"?"🌐 Онлайн":source==="cache"?"💾 Кеш":"📴 Офлайн"}</div><div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>{loading?<div style={{textAlign:"center",padding:32,color:C.muted}}>🔍 Загружаю...</div>:<div style={{color:C.text,lineHeight:1.75,fontSize:14,whiteSpace:"pre-wrap"}}>{text}</div>}</div></div></div>);
}

function BackupModal({onClose,progress,errorLog,stats,unlockedTopics,onImport}){
  const [tab,setTab]=useState("export");
  const [importText,setImportText]=useState("");
  const [err,setErr]=useState("");
  const [ok,setOk]=useState(false);
  const exportData=()=>{const d={v:1,ts:new Date().toISOString(),progress,errorLog,stats,unlockedTopics};const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`speakbiz_backup_${new Date().toLocaleDateString("ru-RU").replace(/\./g,"-")}.json`;a.click();URL.revokeObjectURL(u);};
  const doImport=()=>{try{const d=JSON.parse(importText);if(!d.progress)throw new Error("Неверный формат");onImport(d);setOk(true);setErr("");}catch(e){setErr("Ошибка: "+e.message);}};
  const ts=a=>({flex:1,padding:"10px 0",background:a?C.accent:"transparent",border:"none",color:a?"#fff":C.muted,cursor:"pointer",borderRadius:10,fontWeight:600,fontSize:14});
  return(<div style={{position:"fixed",inset:0,background:"#000b",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={{background:C.card,borderRadius:"20px 20px 0 0",width:"100%",padding:24,border:`1px solid ${C.border}`}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><div style={{fontWeight:700,fontSize:18}}>💾 Резервная копия</div><button onClick={onClose} style={{background:C.border,border:"none",color:C.text,borderRadius:20,width:32,height:32,fontSize:18,cursor:"pointer"}}>✕</button></div><div style={{display:"flex",gap:8,marginBottom:20,background:C.bg,borderRadius:12,padding:4}}><button style={ts(tab==="export")} onClick={()=>setTab("export")}>📤 Экспорт</button><button style={ts(tab==="import")} onClick={()=>setTab("import")}>📥 Импорт</button></div>{tab==="export"?(<div><p style={{color:C.muted,fontSize:14,marginBottom:16,lineHeight:1.6}}>Сохраните прогресс в JSON-файл. Восстанавливайте на любом устройстве.</p><div style={{background:C.bg,borderRadius:12,padding:14,marginBottom:16}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{[{label:"Выучено",val:Object.values(progress).filter(p=>p.level>=5).length},{label:"Ошибок",val:errorLog.length},{label:"Серия",val:stats.streak},{label:"Тем",val:unlockedTopics.length}].map(s=>(<div key={s.label} style={{textAlign:"center"}}><div style={{fontWeight:700,color:C.accent}}>{s.val}</div><div style={{color:C.muted,fontSize:12}}>{s.label}</div></div>))}</div></div><button onClick={exportData} style={{width:"100%",background:C.accent,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontWeight:700,fontSize:16,cursor:"pointer"}}>📥 Скачать backup.json</button></div>):(<div><p style={{color:C.muted,fontSize:14,marginBottom:12,lineHeight:1.6}}>Вставьте содержимое backup.json файла:</p><textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder='{"v":1, "progress": {...}}' style={{width:"100%",height:100,background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,padding:12,color:C.text,fontSize:13,resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"monospace"}}/>{err&&<div style={{color:C.red,fontSize:13,margin:"6px 0"}}>{err}</div>}{ok&&<div style={{color:C.green,fontSize:13,margin:"6px 0"}}>✅ Прогресс восстановлен!</div>}<button onClick={doImport} disabled={!importText.trim()} style={{width:"100%",background:importText.trim()?C.green:"#334155",color:"#fff",border:"none",borderRadius:12,padding:"14px",fontWeight:700,fontSize:16,cursor:importText.trim()?"pointer":"default",marginTop:8}}>📤 Восстановить</button></div>)}</div></div>);
}

function App(){
  const [screen,setScreen]=useState("loading");
  const [progress,setProgress]=useState({});
  const [errorLog,setErrorLog]=useState([]);
  const [stats,setStats]=useState({streak:0,lastDate:null,totalCorrect:0,totalWrong:0,sessionsCompleted:0});
  const [unlockedTopics,setUnlockedTopics]=useState([0]);
  const [activeTopicIdx,setActiveTopicIdx]=useState(0);
  const [phoneticWord,setPhoneticWord]=useState(null);
  const [showBackup,setShowBackup]=useState(false);
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [quizWords,setQuizWords]=useState([]);
  const [quizIdx,setQuizIdx]=useState(0);
  const [quizType,setQuizType]=useState("mcq");
  const [choices,setChoices]=useState([]);
  const [selected,setSelected]=useState(null);
  const [typed,setTyped]=useState("");
  const [showResult,setShowResult]=useState(false);
  const [sessionScore,setSessionScore]=useState({correct:0,wrong:0});
  const [quizDirection,setQuizDirection]=useState("en2ru");
  const [studyIdx,setStudyIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);

  useEffect(()=>{const on=()=>setIsOnline(true);const off=()=>setIsOnline(false);window.addEventListener("online",on);window.addEventListener("offline",off);return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};},[]);
  useEffect(()=>{const p=LS.get("sbz_progress")||{};const e=LS.get("sbz_errors")||[];const s=LS.get("sbz_stats")||{streak:0,lastDate:null,totalCorrect:0,totalWrong:0,sessionsCompleted:0};const u=LS.get("sbz_unlocked")||[0];setProgress(p);setErrorLog(e);setStats(s);setUnlockedTopics(u);setActiveTopicIdx(u[u.length-1]);setScreen("home");},[]);
  const saveAll=useCallback((p,e,s,u)=>{LS.set("sbz_progress",p);LS.set("sbz_errors",e);LS.set("sbz_stats",s);LS.set("sbz_unlocked",u);},[]);
  const handleImport=useCallback(d=>{setProgress(d.progress||{});setErrorLog(d.errorLog||[]);setStats(d.stats||{streak:0,lastDate:null,totalCorrect:0,totalWrong:0,sessionsCompleted:0});const u=d.unlockedTopics||[0];setUnlockedTopics(u);setActiveTopicIdx(u[u.length-1]);saveAll(d.progress||{},d.errorLog||[],d.stats||{},u);},[saveAll]);
  const updateStreak=useCallback(s=>{const today=new Date().toDateString();if(s.lastDate===today)return s;const yesterday=new Date(Date.now()-86400000).toDateString();return{...s,streak:s.lastDate===yesterday?s.streak+1:1,lastDate:today};},[]);
  const buildChoices=(word,allWords,dir)=>{const correct=dir==="en2ru"?word.ru:word.en;const pool=shuffle(allWords.filter(w=>w.id!==word.id)).slice(0,3).map(w=>dir==="en2ru"?w.ru:w.en);setChoices(shuffle([correct,...pool]));};
  const startQuiz=useCallback((tidx)=>{const topic=TOPICS[tidx];const now=Date.now();let due=topic.words.filter(w=>{const p=progress[w.id];if(!p)return true;return p.level<5&&(p.nextReview||0)<=now;});if(due.length===0)due=topic.words.slice(0,10);const words=shuffle(due).slice(0,10);setQuizWords(words);setQuizIdx(0);setSessionScore({correct:0,wrong:0});setSelected(null);setTyped("");setShowResult(false);const dir=Math.random()>.5?"en2ru":"ru2en";setQuizDirection(dir);buildChoices(words[0],topic.words,dir);setQuizType(Math.random()>.4?"mcq":"translate");setScreen("quiz");},[progress]);
  const handleAnswer=useCallback(answer=>{const word=quizWords[quizIdx];const correct=quizDirection==="en2ru"?word.ru:word.en;const isOk=answer.trim().toLowerCase()===correct.trim().toLowerCase();setSelected(answer);setShowResult(true);const lvl=progress[word.id]?.level||0;const newLevel=isOk?Math.min(lvl+1,5):Math.max(lvl-1,0);const intervals=[0,1,3,7,14,30];const nextReview=Date.now()+intervals[newLevel]*86400000;const newProg={...progress,[word.id]:{level:newLevel,nextReview,errors:(progress[word.id]?.errors||0)+(isOk?0:1)}};const topic=TOPICS[activeTopicIdx];let newErrors=errorLog;if(!isOk)newErrors=[{wordId:word.id,en:word.en,ru:word.ru,date:new Date().toLocaleDateString("ru-RU"),topic:topic.title},...errorLog].slice(0,200);const ns={correct:sessionScore.correct+(isOk?1:0),wrong:sessionScore.wrong+(isOk?0:1)};setSessionScore(ns);setProgress(newProg);setErrorLog(newErrors);saveAll(newProg,newErrors,stats,unlockedTopics);},[quizWords,quizIdx,quizDirection,progress,errorLog,stats,unlockedTopics,activeTopicIdx,sessionScore,saveAll]);
  const nextQuizCard=useCallback(()=>{const nextIdx=quizIdx+1;if(nextIdx>=quizWords.length){const newStats=updateStreak({...stats,totalCorrect:stats.totalCorrect+sessionScore.correct,totalWrong:stats.totalWrong+sessionScore.wrong,sessionsCompleted:stats.sessionsCompleted+1});const allDone=TOPICS[activeTopicIdx].words.every(w=>(progress[w.id]?.level||0)>=3);let nu=unlockedTopics;if(allDone&&activeTopicIdx===unlockedTopics[unlockedTopics.length-1]&&activeTopicIdx+1<TOPICS.length){nu=[...unlockedTopics,activeTopicIdx+1];setUnlockedTopics(nu);}setStats(newStats);saveAll(progress,errorLog,newStats,nu);setScreen("done");return;}const nw=quizWords[nextIdx];const dir=Math.random()>.5?"en2ru":"ru2en";setQuizDirection(dir);setQuizIdx(nextIdx);setSelected(null);setTyped("");setShowResult(false);buildChoices(nw,TOPICS[activeTopicIdx].words,dir);setQuizType(Math.random()>.4?"mcq":"translate");},[quizIdx,quizWords,activeTopicIdx,sessionScore,progress,errorLog,stats,unlockedTopics,updateStreak,saveAll]);

  const appS={minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"inherit",paddingBottom:80};
  const headS={background:C.card,borderBottom:`1px solid ${C.border}`,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"};
  const cardS={background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`};
  const btn=(bg,col="#fff")=>({background:bg,color:col,border:"none",borderRadius:12,padding:"12px 20px",fontWeight:600,fontSize:15,cursor:"pointer",width:"100%",marginBottom:8});
  const badge=c=>({background:c+"22",color:c,border:`1px solid ${c}55`,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,display:"inline-block"});
  const topic=TOPICS[activeTopicIdx];
  const topicPct=topic.words.reduce((a,w)=>a+Math.min((progress[w.id]?.level||0)/5,1),0)/topic.words.length*100;

  if(screen==="loading")return<div style={{...appS,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40}}>⏳</div>;

  if(screen==="home")return(<div style={appS}>{phoneticWord&&<PhoneticModal word={phoneticWord} onClose={()=>setPhoneticWord(null)}/>}{showBackup&&<BackupModal onClose={()=>setShowBackup(false)} progress={progress} errorLog={errorLog} stats={stats} unlockedTopics={unlockedTopics} onImport={d=>{handleImport(d);setShowBackup(false);}}/>}<div style={headS}><div style={{fontSize:20,fontWeight:700}}>🗣 SpeakBiz</div><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:11,color:isOnline?C.green:C.muted}}>{isOnline?"🌐":"📴"}</span><button onClick={()=>setShowBackup(true)} style={{background:C.border,border:"none",color:C.muted,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12}}>💾</button><div style={{background:"#7c3aed22",border:"1px solid #7c3aed55",borderRadius:20,padding:"4px 12px",fontSize:13}}>🔥{stats.streak}</div></div></div><div style={{padding:"20px 16px"}}><p style={{color:C.muted,fontSize:13,margin:"0 0 12px"}}>Тема дня</p><div style={{...cardS,borderColor:C.accent+"66",background:"linear-gradient(135deg,#1e293b,#1a1f35)"}}><div style={{fontSize:36,marginBottom:8}}>{topic.emoji}</div><div style={{fontWeight:700,fontSize:18}}>{topic.title}</div><div style={{color:C.muted,fontSize:13,marginBottom:12}}>{topic.titleEn} · {topic.words.length} слов</div><ProgressBar pct={topicPct}/><div style={{color:C.muted,fontSize:12,marginBottom:14}}>{Math.round(topicPct)}% изучено</div><button style={btn(C.accent)} onClick={()=>{setStudyIdx(0);setFlipped(false);setScreen("study");}}>📖 Изучить слова</button><button style={btn(C.blue)} onClick={()=>startQuiz(activeTopicIdx)}>🎯 Тренировка</button></div><p style={{color:C.muted,fontSize:13,margin:"16px 0 10px"}}>Все темы</p>{TOPICS.map((t,i)=>{const unlocked=unlockedTopics.includes(i);const tp=t.words.reduce((a,w)=>a+Math.min((progress[w.id]?.level||0)/5,1),0)/t.words.length*100;return(<div key={t.id} style={{...cardS,opacity:unlocked?1:0.45,cursor:unlocked?"pointer":"default"}} onClick={()=>{if(unlocked)setActiveTopicIdx(i);}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>{t.emoji}</span><div><div style={{fontWeight:600,fontSize:14}}>{t.title}</div><div style={{color:C.muted,fontSize:12}}>{t.words.length} слов</div></div></div>{!unlocked?<span>🔒</span>:<span style={badge(Math.round(tp)===100?C.green:C.accent)}>{Math.round(tp)}%</span>}</div>{unlocked&&<ProgressBar pct={tp} color={tp===100?C.green:C.accent}/>}</div>);})}</div><BottomNav screen={screen} setScreen={setScreen} errorCount={errorLog.length}/></div>);

  if(screen==="study"){const word=topic.words[studyIdx];const wlv=(progress[word.id]||{level:0}).level;return(<div style={appS}>{phoneticWord&&<PhoneticModal word={phoneticWord} onClose={()=>setPhoneticWord(null)}/>}<div style={headS}><button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>←</button><div style={{fontWeight:600}}>{topic.emoji} {topic.title}</div><div style={{color:C.muted,fontSize:13}}>{studyIdx+1}/{topic.words.length}</div></div><div style={{padding:"16px 16px 0"}}><ProgressBar pct={(studyIdx+1)/topic.words.length*100}/></div><div style={{padding:"12px 16px"}}><div style={{...cardS,minHeight:240,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}} onClick={()=>setFlipped(!flipped)}>{!flipped?(<><div style={{fontSize:11,color:C.muted,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>🇬🇧 Английский</div><div style={{fontSize:28,fontWeight:700,marginBottom:10}}>{word.en}</div><div style={{fontFamily:"monospace",fontSize:16,color:C.blue,marginBottom:4}}>{word.ipa}</div><div style={{fontSize:15,color:C.purple,fontStyle:"italic",marginBottom:14}}>📢 {word.rus}</div><div style={{color:C.muted,fontSize:12}}>Нажми для перевода</div></>):(<><div style={{fontSize:11,color:C.muted,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>🇷🇺 Перевод</div><div style={{fontSize:22,fontWeight:700,marginBottom:10}}>{word.ru}</div><div style={{fontFamily:"monospace",fontSize:14,color:C.blue,marginBottom:4}}>{word.ipa}</div><div style={{fontSize:14,color:C.purple,fontStyle:"italic",marginBottom:10}}>📢 {word.rus}</div><span style={badge(levelColor(wlv))}>{levelLabel(wlv)}</span></>)}</div><button onClick={()=>setPhoneticWord(word)} style={{...btn("#7c3aed22",C.purple),border:`1px solid ${C.purple}44`,marginBottom:12}}>🔬 Фонетический разбор</button><div style={{display:"flex",gap:10}}><button style={{flex:1,background:C.border,color:C.muted,border:"none",borderRadius:12,padding:"12px 0",fontWeight:600,cursor:"pointer"}} onClick={()=>{if(studyIdx>0){setStudyIdx(studyIdx-1);setFlipped(false);}}}>← Назад</button>{studyIdx<topic.words.length-1?<button style={{flex:1,background:C.accent,color:"#fff",border:"none",borderRadius:12,padding:"12px 0",fontWeight:600,cursor:"pointer"}} onClick={()=>{setStudyIdx(studyIdx+1);setFlipped(false);}}>Далее →</button>:<button style={{flex:1,background:C.green,color:"#fff",border:"none",borderRadius:12,padding:"12px 0",fontWeight:600,cursor:"pointer"}} onClick={()=>startQuiz(activeTopicIdx)}>🎯 Тренировка!</button>}</div></div><BottomNav screen={screen} setScreen={setScreen} errorCount={errorLog.length}/></div>);}

  if(screen==="quiz"){const word=quizWords[quizIdx];if(!word)return null;const question=quizDirection==="en2ru"?word.en:word.ru;const correct=quizDirection==="en2ru"?word.ru:word.en;const isOk=selected!==null&&selected.trim().toLowerCase()===correct.trim().toLowerCase();return(<div style={appS}>{phoneticWord&&<PhoneticModal word={phoneticWord} onClose={()=>setPhoneticWord(null)}/>}<div style={headS}><button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>✕</button><div style={{fontWeight:600}}>{quizIdx+1}/{quizWords.length}</div><div>✅{sessionScore.correct} ❌{sessionScore.wrong}</div></div><div style={{padding:"16px 16px 0"}}><ProgressBar pct={quizIdx/quizWords.length*100} color={C.yellow}/></div><div style={{padding:"12px 16px"}}><div style={{...cardS,textAlign:"center"}}><div style={{fontSize:12,color:C.muted,marginBottom:6}}>{quizDirection==="en2ru"?"🇬🇧 Переведи на русский":"🇷🇺 Translate to English"}</div><div style={{fontSize:26,fontWeight:700,marginBottom:6}}>{question}</div>{quizDirection==="en2ru"&&<div style={{fontSize:13,color:C.blue,fontFamily:"monospace"}}>{word.ipa}<span style={{marginLeft:8,color:C.purple,fontFamily:"sans-serif",fontStyle:"italic"}}>· {word.rus}</span></div>}</div>{quizType==="mcq"?choices.map((c,i)=>{let bg=C.card,bc=C.border;if(showResult){if(c===correct){bg="#16a34a22";bc=C.green;}else if(c===selected&&!isOk){bg="#dc262622";bc=C.red;}}return(<button key={i} disabled={showResult} style={{width:"100%",textAlign:"left",cursor:showResult?"default":"pointer",border:`2px solid ${bc}`,background:bg,marginBottom:8,fontWeight:500,fontSize:15,padding:"14px 16px",borderRadius:12,color:C.text}} onClick={()=>handleAnswer(c)}>{c}</button>);}):(<div><input value={typed} onChange={e=>setTyped(e.target.value)} disabled={showResult} onKeyDown={e=>{if(e.key==="Enter"&&!showResult&&typed.trim())handleAnswer(typed.trim());}} placeholder="Введи перевод..." style={{width:"100%",padding:14,borderRadius:12,border:`2px solid ${showResult?(isOk?C.green:C.red):C.border}`,background:C.card,color:C.text,fontSize:16,boxSizing:"border-box",outline:"none",marginBottom:8}}/>{!showResult&&<button style={btn(C.accent)} onClick={()=>typed.trim()&&handleAnswer(typed.trim())}>Проверить</button>}</div>)}{showResult&&<div style={{...cardS,background:isOk?"#16a34a22":"#dc262622",border:`1px solid ${isOk?C.green:C.red}`,textAlign:"center"}}><div style={{fontSize:20,marginBottom:4}}>{isOk?"✅ Верно!":"❌ Ошибка"}</div>{!isOk&&<div style={{fontWeight:600,marginBottom:8}}>→ {correct}</div>}<button onClick={()=>setPhoneticWord(word)} style={{background:"#7c3aed22",border:`1px solid ${C.purple}44`,color:C.purple,borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600,marginBottom:10,width:"100%"}}>🔬 Фонетический разбор</button><button style={{...btn(isOk?C.green:C.accent),marginBottom:0}} onClick={nextQuizCard}>Далее →</button></div>}</div></div>);}

  if(screen==="done"){const total=sessionScore.correct+sessionScore.wrong;const pct=Math.round(sessionScore.correct/(total||1)*100);return(<div style={{...appS,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}><div style={{fontSize:64,marginBottom:16}}>{pct>=80?"🏆":pct>=50?"👍":"💪"}</div><div style={{fontSize:24,fontWeight:700,marginBottom:8}}>Тренировка завершена!</div><div style={{color:C.muted,marginBottom:24}}>Правильно: {sessionScore.correct} из {total} ({pct}%)</div><div style={{...cardS,width:"100%",maxWidth:360,textAlign:"center"}}><div style={{display:"flex",justifyContent:"space-around"}}><div><div style={{fontSize:24,fontWeight:700,color:C.green}}>{sessionScore.correct}</div><div style={{color:C.muted,fontSize:12}}>Верно</div></div><div><div style={{fontSize:24,fontWeight:700,color:C.red}}>{sessionScore.wrong}</div><div style={{color:C.muted,fontSize:12}}>Ошибок</div></div><div><div style={{fontSize:24,fontWeight:700,color:C.yellow}}>🔥{stats.streak}</div><div style={{color:C.muted,fontSize:12}}>Серия</div></div></div></div><button style={{...btn(C.accent),maxWidth:360,width:"100%",marginTop:16}} onClick={()=>setScreen("home")}>На главную</button><button style={{...btn(C.card,C.muted),maxWidth:360,width:"100%"}} onClick={()=>startQuiz(activeTopicIdx)}>Повторить ещё раз</button></div>);}

  if(screen==="errors")return(<div style={appS}>{phoneticWord&&<PhoneticModal word={phoneticWord} onClose={()=>setPhoneticWord(null)}/>}<div style={headS}><div style={{fontSize:18,fontWeight:700}}>📔 Дневник ошибок</div><span style={badge(C.red)}>{errorLog.length}</span></div><div style={{padding:"20px 16px"}}>{errorLog.length===0?<div style={{textAlign:"center",color:C.muted,marginTop:60}}><div style={{fontSize:48}}>🎉</div><div style={{marginTop:12}}>Ошибок пока нет!</div></div>:errorLog.map((e,i)=>{const fw=TOPICS.flatMap(t=>t.words).find(w=>w.id===e.wordId)||e;return(<div key={i} style={cardS}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}><div style={{fontWeight:600}}>{e.en}</div><div style={{color:C.blue,fontFamily:"monospace",fontSize:13}}>{fw.ipa}</div><div style={{color:C.purple,fontSize:13,fontStyle:"italic"}}>📢 {fw.rus}</div><div style={{color:C.muted,fontSize:13}}>{e.ru}</div><div style={{fontSize:11,color:C.muted,marginTop:4}}>{e.topic} · {e.date}</div></div><button onClick={()=>setPhoneticWord(fw)} style={{background:"#7c3aed22",border:`1px solid ${C.purple}44`,color:C.purple,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:18,marginLeft:8}}>🔬</button></div></div>);})}</div><BottomNav screen={screen} setScreen={setScreen} errorCount={errorLog.length}/></div>);

  if(screen==="progress"){const totalWords=TOPICS.reduce((a,t)=>a+t.words.length,0);const learned=Object.values(progress).filter(p=>p.level>=5).length;const inProg=Object.values(progress).filter(p=>p.level>=1&&p.level<5).length;return(<div style={appS}>{showBackup&&<BackupModal onClose={()=>setShowBackup(false)} progress={progress} errorLog={errorLog} stats={stats} unlockedTopics={unlockedTopics} onImport={d=>{handleImport(d);setShowBackup(false);}}/>}<div style={headS}><div style={{fontSize:18,fontWeight:700}}>📊 Прогресс</div><button onClick={()=>setShowBackup(true)} style={{background:C.border,border:"none",color:C.muted,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12}}>💾 Backup</button></div><div style={{padding:"20px 16px"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>{[{label:"🔥 Серия",val:stats.streak,color:C.yellow},{label:"✅ Выучено",val:learned,color:C.green},{label:"📚 В процессе",val:inProg,color:C.accent},{label:"🎯 Сессий",val:stats.sessionsCompleted,color:C.blue}].map(s=>(<div key={s.label} style={{...cardS,textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:s.color}}>{s.val}</div><div style={{color:C.muted,fontSize:12}}>{s.label}</div></div>))}</div><div style={cardS}><div style={{marginBottom:6,fontWeight:600}}>Общий словарь</div><ProgressBar pct={learned/totalWords*100} color={C.green}/><div style={{color:C.muted,fontSize:12}}>{learned} из {totalWords} слов выучено</div></div><div style={{fontWeight:600,margin:"16px 0 10px"}}>По темам</div>{TOPICS.map((t,i)=>{const unlocked=unlockedTopics.includes(i);const tp=t.words.reduce((a,w)=>a+Math.min((progress[w.id]?.level||0)/5,1),0)/t.words.length*100;return(<div key={t.id} style={{...cardS,opacity:unlocked?1:0.4}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>{t.emoji} {t.title}</span><span style={{color:C.muted,fontSize:13}}>{Math.round(tp)}%</span></div><ProgressBar pct={tp} color={tp>=100?C.green:C.accent}/></div>);})}</div><BottomNav screen={screen} setScreen={setScreen} errorCount={errorLog.length}/></div>);}

  if(screen==="vocab")return(<div style={appS}>{phoneticWord&&<PhoneticModal word={phoneticWord} onClose={()=>setPhoneticWord(null)}/>}<div style={headS}><div style={{fontSize:18,fontWeight:700}}>📚 Словарь</div></div><div style={{padding:"20px 16px"}}>{TOPICS.map((t,i)=>{const unlocked=unlockedTopics.includes(i);return(<div key={t.id}><div style={{display:"flex",alignItems:"center",gap:8,margin:"16px 0 8px"}}><span style={{fontSize:20}}>{t.emoji}</span><span style={{fontWeight:700}}>{t.title}</span>{!unlocked&&<span style={{fontSize:14}}>🔒</span>}</div>{unlocked&&t.words.map(w=>{const lv=progress[w.id]?.level||0;return(<div key={w.id} style={{...cardS,padding:"10px 14px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}><div style={{fontWeight:500}}>{w.en}</div><div style={{color:C.blue,fontFamily:"monospace",fontSize:12}}>{w.ipa}</div><div style={{color:C.purple,fontSize:12,fontStyle:"italic"}}>📢 {w.rus}</div><div style={{color:C.muted,fontSize:13}}>{w.ru}</div></div><div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,marginLeft:8}}><span style={badge(levelColor(lv))}>{levelLabel(lv)}</span><button onClick={()=>setPhoneticWord(w)} style={{background:"#7c3aed22",border:`1px solid ${C.purple}44`,color:C.purple,borderRadius:8,padding:"4px 8px",cursor:"pointer",fontSize:14}}>🔬</button></div></div></div>);})}</div>);})}</div><BottomNav screen={screen} setScreen={setScreen} errorCount={errorLog.length}/></div>);

  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
